    <div class="txt">
      <strong>Install MIST Portal</strong>
      <span>Add to your home screen for the best experience</span>
    </div>
    <button class="btn-i" id="install-btn">Install</button>
    <button id="install-dismiss">✕</button>
  </div>

  <div id="root"></div>

  <script>
    // React calls this when ready; also hard-removed after 3s
    window.mistAppReady = function() {
      const s = document.getElementById('splash');
      if (s) { s.classList.add('fade'); setTimeout(() => s.remove(), 700); }
      window.mistAppReady = null;
    };
    setTimeout(() => { if(window.mistAppReady) window.mistAppReady(); }, 3000);
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
    const bar = document.getElementById('offline-bar');
    window.addEventListener('offline', () => bar.classList.add('show'));
    window.addEventListener('online',  () => bar.classList.remove('show'));
    if (!navigator.onLine) bar.classList.add('show');
    let deferred;
    const banner = document.getElementById('install-banner');
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); deferred = e;
      if (!sessionStorage.getItem('pwa-dismissed'))
        setTimeout(() => banner.classList.add('show'), 4000);
    });
    document.getElementById('install-btn').addEventListener('click', async () => {
      banner.classList.remove('show');
      if (deferred) { deferred.prompt(); deferred = null; }
    });
    document.getElementById('install-dismiss').addEventListener('click', () => {
      banner.classList.remove('show');
      sessionStorage.setItem('pwa-dismissed','1');
    });
  </script>
